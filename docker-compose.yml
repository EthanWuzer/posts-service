version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Mount the RSA public key used to verify JWTs issued by the users-service.
      # Generate or copy it from the users-service key pair, e.g.:
      #   openssl rsa -in private.pem -pubout -out public.pem
      - ./keys/jwt_public.pem:/run/secrets/jwt_public.pem:ro
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
